<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BattleArena — Demo</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="topbar">
        <div>
            <h1>⚔️ BattleArena</h1>
            <p id="status">Chưacó đăng nhập</p>
        </div>
        <div class="gold">Gold: <span id="goldDisplay">—</span></div>
    </div>

    <section class="card" id="authSection">
        <h2>Đăng nhập / Đăng ký</h2>
        <div class="row">
            <input id="username" placeholder="username" autocomplete="username">
            <input id="password" type="password" placeholder="password" autocomplete="current-password">
        </div>
        <div class="row" style="margin-top:8px">
            <button id="btnRegister">Đăng ký</button>
            <button id="btnLogin">Đăng nhập</button>
            <button id="btnLogout">Đăng xuất</button>
        </div>
    </section>

    <div id="appSection" hidden>
        <section class="card">
            <h2>Shop</h2>
            <div id="shopList"></div>
            <div class="pager" id="shopPager"></div>
            <div class="row" style="margin-top:10px">
                <button id="btnReloadShop">Tải lại Shop</button>
            </div>
        </section>

        <section class="card">
            <h2>Inventory</h2>
            <div id="inventoryList"></div>
            <div class="pager" id="inventoryPager"></div>
            <div class="row" style="margin-top:10px">
                <button id="btnReloadInventory">Tải lại Inventory</button>
            </div>
        </section>

        <section class="card">
            <h2>Match & Leaderboard</h2>
            <div class="row">
                <button id="btnStartMatch">Bắt đầu trận đấu</button>
                <span id="matchStatus" class="muted"></span>
            </div>
            <div class="row" style="margin-top:8px">
                <input id="scoreInput" type="number" placeholder="Điểm số" min="0">
                <button id="btnSubmitScore">Nộp điểm</button>
            </div>
            <div id="leaderboardList" style="margin-top:12px"></div>
            <div class="row" style="margin-top:10px">
                <button id="btnReloadLeaderboard">Tải lại Top 10</button>
            </div>
        </section>

        <section class="card">
            <h2>Chat real-time</h2>
            <div id="chatLog"></div>
            <div class="row">
                <input id="chatInput" placeholder="Nhập tin nhắn..." style="flex:1">
                <button id="btnSendChat">Gửi</button>
            </div>
        </section>
    </div>

    <div id="toastContainer"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
